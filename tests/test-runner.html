<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mat Life - Milestone 1 Test Runner</title>
  <style>
    body {
      font-family: 'Courier New', monospace;
      background: #0a0a0f;
      color: #e8e8e8;
      padding: 20px;
      line-height: 1.6;
    }
    h1 {
      color: #e94560;
      border-bottom: 2px solid #e94560;
      padding-bottom: 10px;
    }
    .console {
      background: #12121a;
      border: 1px solid #2a2a3e;
      padding: 15px;
      margin-top: 20px;
      min-height: 400px;
      white-space: pre-wrap;
      font-size: 14px;
    }
    .success { color: #4caf50; }
    .error { color: #f44336; }
    .info { color: #ffc857; }
    button {
      background: #e94560;
      color: white;
      border: none;
      padding: 10px 20px;
      font-size: 16px;
      cursor: pointer;
      margin-top: 10px;
    }
    button:hover {
      background: #ff5a73;
    }
  </style>
</head>
<body>
  <h1>Mat Life: Wrestling Simulator</h1>
  <h2>Milestone 1 - Invisible Engine Test Runner</h2>
  <p>Open the browser console (F12) to see detailed test output.</p>
  <button onclick="runTests()">Run Integration Tests</button>
  <button onclick="clearConsole()">Clear Console</button>
  
  <div class="console" id="console-output"></div>

  <script type="module">
    import { runIntegrationTest } from './integration-m1.test.js';
    
    // Capture console output
    const consoleOutput = document.getElementById('console-output');
    const originalLog = console.log;
    const originalError = console.error;
    
    function appendToConsole(text, type = 'info') {
      const line = document.createElement('div');
      line.className = type;
      line.textContent = text;
      consoleOutput.appendChild(line);
      consoleOutput.scrollTop = consoleOutput.scrollHeight;
    }
    
    console.log = function(...args) {
      originalLog.apply(console, args);
      appendToConsole(args.join(' '), 'info');
    };
    
    console.error = function(...args) {
      originalError.apply(console, args);
      appendToConsole(args.join(' '), 'error');
    };
    
    window.runTests = async function() {
      consoleOutput.innerHTML = '';
      console.log('Starting Milestone 1 Integration Tests...\n');
      
      try {
        await runIntegrationTest();
      } catch (error) {
        console.error('Test execution failed:', error);
      }
    };
    
    window.clearConsole = function() {
      consoleOutput.innerHTML = '';
    };
    
    // Auto-run on load
    setTimeout(runTests, 500);
  </script>
</body>
</html>
