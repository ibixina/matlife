<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mat Life - Comprehensive Test Runner</title>
    <style>
        body {
            font-family: 'Courier New', monospace;
            background: #0a0a0f;
            color: #e8e8e8;
            padding: 20px;
            line-height: 1.6;
        }

        h1 {
            color: #e94560;
            border-bottom: 2px solid #e94560;
            padding-bottom: 10px;
        }

        .console {
            background: #12121a;
            border: 1px solid #2a2a3e;
            padding: 15px;
            margin-top: 20px;
            min-height: 400px;
            white-space: pre-wrap;
            font-size: 14px;
        }

        .success {
            color: #4caf50;
            font-weight: bold;
        }

        .error {
            color: #f44336;
            font-weight: bold;
        }

        .info {
            color: #ffc857;
        }

        button {
            background: #e94560;
            color: white;
            border: none;
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
            margin-top: 10px;
        }

        button:hover {
            background: #ff5a73;
        }
    </style>
</head>

<body>
    <h1>Mat Life: Wrestling Simulator</h1>
    <h2>Comprehensive Integration Test Runner</h2>
    <button onclick="location.reload()">Run Comprehensive Tests</button>
    <button onclick="clearConsole()">Clear Console</button>

    <div class="console" id="console-output"></div>

    <script type="module">
        // Capture console output
        const consoleOutput = document.getElementById('console-output');
        const originalLog = console.log;
        const originalError = console.error;

        function appendToConsole(text, type = 'info') {
            const line = document.createElement('div');

            if (text.includes('✓ PASS')) type = 'success';
            if (text.includes('✗ FAIL')) type = 'error';

            line.className = type;
            line.textContent = text;
            consoleOutput.appendChild(line);
            consoleOutput.scrollTop = consoleOutput.scrollHeight;
        }

        console.log = function (...args) {
            originalLog.apply(console, args);
            appendToConsole(args.join(' '), 'info');
        };

        console.error = function (...args) {
            originalError.apply(console, args);
            appendToConsole(args.join(' '), 'error');
        };

        window.clearConsole = function () {
            consoleOutput.innerHTML = '';
        };

        // Load and run tests automatically
        import('./integration-comprehensive.test.js')
            .then(() => {
                console.log('Test file imported successfully.');
            })
            .catch(err => {
                console.error('Failed to load tests:', err);
            });
    </script>
</body>

</html>
